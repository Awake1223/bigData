version: '3.8'
services:
  postgres:
    build: .
    container_name: postgres_logs_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      SECRET_HASH: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:    
    name: postgres_data
